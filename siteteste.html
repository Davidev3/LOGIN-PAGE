<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>
    <link rel="stylesheet" href="siteteste.css" />
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
   
  </head>
  <body>
    <div class="login-form">
      <h1>Login</h1>
      <div class="input-wrapper">
      <input type="text" class="username" placeholder="Username" required />
      <svg xmlns="http://www.w3.org/2000/svg"viewBox="0 0 24 24">
         <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
      </svg>
      </div>
      <div class="input-wrapper">
      <input type="password" id="password" placeholder="Password" required />
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
      <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>  
    </svg>
</div>
      <div class="remember-forgot-container">
        <div class="checkbox-container">
          <input type="checkbox" id="lembrar"/>
          <label for="lembrar">Remember me</label>
        </div>
        <a href="#" class="forgot-password">Forget Password?</a>
      </div>
      <button type="button" class="btn" onclick="handleLogin()">Login</button>
      <br>
       <p style="display: inline;">Don't have any account? </p>
       <a href="#" class="register" style="display: inline;">Register</a>
  </body>
</html>
